# EmbodiedPromptForge occlusion task suite (Milestone 3, Task 3.9).
#
# The task set the forge experiments (Task 3.10) run against: pick-place-style
# RoboTwin tasks with occlusion variants, split into a train split and a
# validation split whose occlusion patterns are UNSEEN in train. The split is
# by occlusion PATTERN, not just by seed: train never varies the camera
# viewpoint axis, val always does, and val uses held-out seed ranges.
#
# Occlusion pattern taxonomy (all expressed through existing RoboTwin knobs —
# domain_randomization flags plus seed ranges; no RoboTwin modifications):
#
#   Axes:
#     - clutter:  domain_randomization.cluttered_table — distractor objects on
#                 the table partially/fully occluding the target from the
#                 head camera.
#     - lighting: domain_randomization.random_light + crazy_random_light_rate —
#                 illumination-driven obscuration (shadows, glare, low
#                 visibility of the target).
#     - camera:   domain_randomization.random_head_camera_dis > 0 — head-camera
#                 viewpoint randomization, changing the occlusion geometry
#                 (which parts of the target are visible per episode).
#
#   Train pattern set A (camera axis NEVER varied):
#     - occ-distractor-staticcam-fixedlight:  clutter on, fixed light, static cam
#     - occ-distractor-staticcam-randomlight: clutter on, random light, static cam
#
#   Validation pattern set B (camera axis ALWAYS varied — unseen in train):
#     - occ-distractor-randomcam-fixedlight
#     - occ-distractor-randomcam-randomlight
#     - occ-nodistractor-randomcam-randomlight (clutter off: pure
#       viewpoint + lighting occlusion)
#
#   Seed ranges: train 100–599, val 900–989 (held out). initial_scene.seed is
#   the per-task base seed; metadata.seed_range is the full range a runner may
#   sample episode seeds from.
#
#   Kept fixed across all tasks (future extension axes): random_background,
#   clean_background_rate, random_table_height.
#
# Split usage: scripts/run_forge.py --tasks configs/forge_tasks.yaml auto-splits
# by metadata.split (train/val); forge.loader.load_forge_tasks(path, split=...)
# filters programmatically. See docs/task_definitions.md (forge section).
tasks:
  # ------------------------------------------------------------- train ---
  - id: forge-train-a2b-right-distractor
    instruction: Pick up the object on the right and place it next to the target object, despite the clutter on the table.
    mission_type: PICK_AND_PLACE
    objects:
      - source_object
      - target_object
    initial_scene:
      task_name: place_a2b_right
      embodiment:
        - aloha-agilex
      domain_randomization:
        random_background: false
        cluttered_table: true
        clean_background_rate: 0
        random_head_camera_dis: 0
        random_table_height: 0
        random_light: false
        crazy_random_light_rate: 0
      seed: 100
      render_freq: 0
      save_data: false
      collect_data: false
    success_criteria:
      - source object is placed next to the target object
      - clutter objects remain on the table
    metadata:
      split: train
      forge_role: prompt_training
      category: forge_occlusion
      difficulty: medium
      occlusion_pattern: occ-distractor-staticcam-fixedlight
      occlusion_axes:
        clutter: true
        lighting: fixed
        camera: static
      occlusion_sources:
        - distractor clutter objects on the table partially occlude the source and target objects from the head camera
        - gripper occludes the source object during the grasp
      seed_range: [100, 199]
      max_rounds: 8
      allowed_actions:
        - PICK_AND_PLACE
        - REOBSERVE
        - STOP
      failure_criteria:
        - object dropped outside the table workspace
        - max_rounds exceeded
      robottwin_task_name: place_a2b_right
      robottwin_task_config: demo_clean

