tasks:
- id: forge-train-a2b-right-distractor
  instruction: Pick up the object on the right and place it next to the target object,
    despite the clutter on the table.
  mission_type: PICK_AND_PLACE
  objects:
  - source_object
  - target_object
  initial_scene:
    task_name: place_a2b_right
    embodiment:
    - aloha-agilex
    domain_randomization:
      random_background: false
      cluttered_table: true
      clean_background_rate: 0
      random_head_camera_dis: 0
      random_table_height: 0
      random_light: false
      crazy_random_light_rate: 0
    seed: 100
    render_freq: 0
    save_data: false
    collect_data: false
  success_criteria:
  - source object is placed next to the target object
  - clutter objects remain on the table
  metadata:
    split: train
    forge_role: prompt_training
    category: forge_occlusion
    difficulty: medium
    occlusion_pattern: occ-distractor-staticcam-fixedlight
    occlusion_axes:
      clutter: true
      lighting: fixed
      camera: static
    occlusion_sources:
    - distractor clutter objects on the table partially occlude the source and target
      objects from the head camera
    - gripper occludes the source object during the grasp
    seed_range:
    - 100
    - 199
    max_rounds: 8
    allowed_actions:
    - PICK_AND_PLACE
    - REOBSERVE
    - STOP
    failure_criteria:
    - object dropped outside the table workspace
    - max_rounds exceeded
    robottwin_task_name: place_a2b_right
    robottwin_task_config: demo_clean
