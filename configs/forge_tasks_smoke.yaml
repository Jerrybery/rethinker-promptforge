  - basket
  initial_scene:
    task_name: place_object_basket
    embodiment:
    - aloha-agilex
    domain_randomization:
      random_background: false
      cluttered_table: true
      clean_background_rate: 0
      random_head_camera_dis: 0.1
      random_table_height: 0
      random_light: false
      crazy_random_light_rate: 0
    seed: 900
    render_freq: 0
    save_data: false
    collect_data: false
  success_criteria:
  - object is inside the basket
  - basket remains upright at its original position
  metadata:
    split: val
    forge_role: prompt_validation
    category: forge_occlusion
    difficulty: hard
