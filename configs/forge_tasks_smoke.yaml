- id: forge-train-can-pot-distractor
  instruction: Pick up the can and move it into the pot, despite the clutter on the
    table.
  mission_type: PICK_AND_PLACE
  objects:
  - can
  - pot
  initial_scene:
    task_name: move_can_pot
    embodiment:
    - aloha-agilex
    domain_randomization:
      random_background: false
      cluttered_table: true
      clean_background_rate: 0
      random_head_camera_dis: 0
      random_table_height: 0
      random_light: false
      crazy_random_light_rate: 0
    seed: 300
    render_freq: 0
    save_data: false
    collect_data: false
  success_criteria:
  - can is inside the pot
  - pot remains upright at its original position
  metadata:
    split: train
    forge_role: prompt_training
    category: forge_occlusion
