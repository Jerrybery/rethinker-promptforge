- id: forge-val-empty-cup-noclutter-randomcam-randomlight
  instruction: Pick up the empty cup and place it upright on the table, despite the
    changing lighting and varying camera viewpoint.
  mission_type: PICK_AND_PLACE
  objects:
  - cup
  initial_scene:
    task_name: place_empty_cup
    embodiment:
    - aloha-agilex
    domain_randomization:
      random_background: false
      cluttered_table: false
      clean_background_rate: 0
      random_head_camera_dis: 0.1
      random_table_height: 0
      random_light: true
      crazy_random_light_rate: 0.1
    seed: 960
    render_freq: 0
    save_data: false
    collect_data: false
  success_criteria:
  - cup is placed upright on the table
  - gripper is open and clear of the cup at episode end
  metadata:
    split: val
    forge_role: prompt_validation
    category: forge_occlusion
    difficulty: hard
    occlusion_pattern: occ-nodistractor-randomcam-randomlight
    occlusion_axes:
      clutter: false
      lighting: random
      camera: random
    occlusion_sources:
    - randomized head-camera viewpoint yields partially visible cup poses unseen in
      train
    - randomized lighting casts shadows and glare that obscure the cup rim and body
    - gripper occludes the cup during the grasp
    seed_range:
    - 960
    - 989
    max_rounds: 8
    allowed_actions:
    - PICK_AND_PLACE
    - REOBSERVE
    - STOP
    failure_criteria:
    - cup dropped or tipped over
    - max_rounds exceeded
    robottwin_task_name: place_empty_cup
    robottwin_task_config: demo_clean
